name: Run continuous integration testing & Astrometry Calibration Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  INDEX_CACHE_VERSION: "v1"
  ASTROMETRY_INDEX_DIR: ~/.astrometry/data

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tox:
    name: Tox test suite
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/tox.yml@v1
    with:
      envs: |
        - linux: py312-test

ac-tests:
    name: Astrometric Calibration Tests
    runs-on: ubuntu-latest
    needs: [tox]


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - name: Restore astrometry index cache
        uses: actions/cache/restore@v4
        id: restore-index
        with:
          key: astrometry-index-${{ env.INDEX_CACHE_VERSION }}
          path: ${{ env.ASTROMETRY_INDEX_DIR }}

      - name: Download index files (if cache missing)
        if: steps.restore-index.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ env.ASTROMETRY_INDEX_DIR }}
          wget -P ${{ env.ASTROMETRY_INDEX_DIR }} http://data.astrometry.net/4200/index-4200-00.fits
          wget -P ${{ env.ASTROMETRY_INDEX_DIR }} http://data.astrometry.net/4200/index-4201-00.fits

      - name: Save index cache
        if: steps.restore-index.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          key: astrometry-index-${{ env.INDEX_CACHE_VERSION }}
          path: ${{ env.ASTROMETRY_INDEX_DIR }}

      - name: Install system dependencies
        run: |
          sudo apt install -y astrometry.net netpbm

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          pip install -e .[test,recommended]

      - name: Run astrometric calibration tests
        run: |
          export PYTHONPATH=${PYTHONPATH}:$(pwd)
          pytest -v --maxfail=3 --disable-warnings --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}